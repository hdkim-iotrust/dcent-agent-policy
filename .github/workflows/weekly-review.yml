name: Weekly Review Collector

# 매주 금요일 00:00 UTC = 금요일 09:00 KST 실행
# (수동 실행도 가능: Actions 탭 → Run workflow)
on:
  schedule:
    - cron: "0 0 * * 5"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run weekly review collector
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python automation/weekly_review.py
